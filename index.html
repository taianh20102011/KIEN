<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AntKingdom - My Private Collection</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* BẢNG MÀU & BIẾN CƠ BẢN */
        :root {
            --bg-color: #09090b; /* Đen tuyền tinh tế */
            --card-bg: #18181b;  /* Xám đen cho thẻ */
            --accent: #84cc16;   /* Xanh lá chanh làm điểm nhấn */
            --accent-glow: rgba(132, 204, 22, 0.15);
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --border: #27272a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); overflow-x: hidden; }

        /* HEADER - CÓ HIỆU ỨNG KÍNH MỜ */
        header {
            position: sticky; top: 0; z-index: 100;
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 8%;
            background: rgba(9, 9, 11, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
        }

        /* LOGO CĂN CHỈNH LẠI CHUẨN XÁC */
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo-icon { font-size: 32px; filter: drop-shadow(0 0 8px var(--accent-glow)); }
        .logo-text { display: flex; flex-direction: column; }
        .logo-text h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; line-height: 1.2; }
        .logo-text h1 span { color: var(--accent); }
        .logo-text p { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 500; }

        /* NÚT BẤM ĐĂNG BÀI */
        .btn-primary {
            background: var(--accent); color: #000; border: none;
            padding: 10px 20px; border-radius: 8px;
            font-weight: 700; font-size: 14px; cursor: pointer;
            display: flex; align-items: center; gap: 8px;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background: #94d82d;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px var(--accent-glow);
        }

        /* BANNER GIỚI THIỆU - CĂN GIỮA TUYỆT ĐỐI */
        .hero-section {
            text-align: center; padding: 80px 20px;
            background: radial-gradient(circle at top, #1a2610 0%, var(--bg-color) 60%);
            border-bottom: 1px solid var(--border);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .hero-section h2 { font-size: 36px; font-weight: 800; margin-bottom: 16px; color: #ffffff; }
        .hero-section p { font-size: 16px; color: var(--text-muted); max-width: 600px; line-height: 1.6; }

        /* LƯỚI DANH SÁCH KIẾN */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px; padding: 40px 8%;
        }

        /* THẺ CARD BO GÓC SANG TRỌNG */
        .card {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 16px; overflow: hidden; cursor: pointer;
            transition: all 0.3s ease; display: flex; flex-direction: column;
        }
        .card:hover {
            border-color: var(--accent);
            transform: translateY(-6px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .card-img-wrapper { width: 100%; height: 220px; overflow: hidden; }
        .card img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .card:hover img { transform: scale(1.05); }
        
        .card-content { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }
        .card-content h3 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
        .card-content p {
            font-size: 14px; color: var(--text-muted); line-height: 1.6;
            display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
            overflow: hidden; margin-bottom: 16px;
        }
        .card-footer {
            font-size: 13px; font-weight: 600; color: var(--accent);
            display: flex; align-items: center; gap: 4px;
        }

        /* NÚT SỬA TRÊN CARD */
        .btn-edit {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-edit:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(132, 204, 22, 0.05);
        }

        /* HỆ THỐNG POPUP (MODAL) */
        .modal {
            display: none; position: fixed; z-index: 200;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.85); backdrop-filter: blur(5px);
        }
        .modal-content {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 16px; margin: 5vh auto;
            position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .close-btn {
            position: absolute; right: 20px; top: 15px;
            font-size: 28px; color: var(--text-muted); cursor: pointer; transition: color 0.2s; z-index: 10;
        }
        .close-btn:hover { color: #fff; }

        /* Giao diện Popup Xem chi tiết */
        .detail-content { width: 90%; max-width: 900px; display: grid; grid-template-columns: 1fr 1fr; overflow: hidden; }
        @media (max-width: 768px) { .detail-content { grid-template-columns: 1fr; max-height: 90vh; overflow-y: auto; } }
        
        .detail-img { width: 100%; height: 100%; object-fit: cover; min-height: 300px; }
        .detail-info { padding: 40px; display: flex; flex-direction: column; max-height: 80vh; }
        .detail-info h2 { font-size: 28px; font-weight: 800; margin-bottom: 20px; color: var(--accent); }
        .detail-scroll { overflow-y: auto; padding-right: 10px; }
        .detail-scroll p {
            font-size: 15px; color: #d4d4d8; line-height: 1.8;
            white-space: pre-line;
        }

        /* Giao diện Popup Nhập liệu */
        .form-content { width: 90%; max-width: 500px; padding: 40px; }
        .form-content h2 { margin-bottom: 24px; font-size: 24px; font-weight: 700; text-align: center; }
        .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
        .input-group label { font-size: 13px; font-weight: 600; color: var(--text-muted); }
        .input-group input, .input-group textarea {
            padding: 14px; border-radius: 8px; background: var(--bg-color);
            border: 1px solid var(--border); color: #fff; font-size: 14px; outline: none;
            transition: border-color 0.2s;
        }
        .input-group input:focus, .input-group textarea:focus { border-color: var(--accent); }
        .btn-submit { width: 100%; padding: 14px; border-radius: 8px; background: var(--accent); color: #000; font-weight: 700; border: none; font-size: 15px; cursor: pointer; }
        .btn-submit:hover { background: #94d82d; }

        /* Tùy chỉnh thanh cuộn */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <span class="logo-icon">🐜</span>
            <div class="logo-text">
                <h1>Ant<span>Kingdom</span></h1>
                <p>My Private Collection</p>
            </div>
        </div>
        <button id="addBtn" class="btn-primary">
            + Đăng loài mới
        </button>
    </header>

    <main>
        <section class="hero-section">
            <h2>Khám Phá Thế Giới Sinh Vật Kỳ Diệu</h2>
            <p>Nơi lưu trữ chi tiết dữ liệu, tập tính và quá trình chăm sóc các dòng kiến cảnh tại gia.</p>
        </section>
        
        <div id="antGallery" class="gallery"></div>
    </main>

    <div id="detailModal" class="modal">
        <div class="modal-content detail-content">
            <span class="close-btn" id="closeDetail">&times;</span>
            <img id="detailImg" class="detail-img" src="" alt="">
            <div class="detail-info">
                <h2 id="detailName"></h2>
                <div class="detail-scroll">
                    <p id="detailDesc"></p>
                </div>
            </div>
        </div>
    </div>

    <div id="antModal" class="modal">
        <div class="modal-content form-content">
            <span class="close-btn" id="closeForm">&times;</span>
            <h2 id="formTitle">Thêm Cư Dân Mới</h2>
            
            <form id="antForm">
                <div class="input-group">
                    <label>Tên loài kiến</label>
                    <input type="text" id="antName" placeholder="VD: Camponotus Nicobarensis" required>
                </div>
                <div class="input-group">
                    <label>Link hình ảnh (URL)</label>
                    <input type="url" id="antImage" placeholder="https://..." required>
                </div>
                <div class="input-group">
                    <label>Mô tả chi tiết</label>
                    <textarea id="antDesc" rows="5" placeholder="Tập tính, độ ẩm, nhiệt độ..." required></textarea>
                </div>
                <div class="input-group">
                    <label>Mật khẩu quản trị</label>
                    <input type="password" id="adminPassword" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-submit">Xác nhận lưu</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const MAT_KHAU_ADMIN = "kien2026"; 

        const firebaseConfig = {
            apiKey: "AIzaSyCtp4izpF1GCH2qWpeLtZOdk33A_iNKzqg",
            authDomain: "nknl-d7b54.firebaseapp.com",
            projectId: "nknl-d7b54",
            storageBucket: "nknl-d7b54.firebasestorage.app",
            messagingSenderId: "792185587281",
            appId: "1:792185587281:web:585e98f2f87d7d59031a70",
            measurementId: "G-TC7XHSSCBX"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Biến DOM và State
        const gallery = document.getElementById('antGallery');
        const antModal = document.getElementById('antModal');
        const detailModal = document.getElementById('detailModal');
        const form = document.getElementById('antForm');
        const formTitle = document.getElementById('formTitle');

        let loadedAnts = [];
        let isSubmitting = false; 
        let editId = null; // null = Thêm mới, có giá trị = Chỉnh sửa loại kiến đó

        // 1. TẢI DỮ LIỆU
        async function loadAntKingdom() {
            gallery.innerHTML = '<p style="text-align: center; color: var(--accent);">🍁 Đang mở cửa hang kiến...</p>';
            try {
                const q = query(collection(db, "ants"), orderBy("createdAt", "desc"));
                const querySnapshot = await getDocs(q);
                
                gallery.innerHTML = ''; 
                loadedAnts = []; 

                if (querySnapshot.empty) {
                    gallery.innerHTML = '<p style="grid-column: 1/-1; text-align: center;">Vương quốc chưa có cư dân.</p>';
                    return;
                }

                querySnapshot.forEach((doc) => {
                    const ant = doc.data();
                    ant.id = doc.id; 
                    loadedAnts.push(ant);

                    const card = document.createElement('div');
                    card.className = 'card';
                    card.dataset.index = loadedAnts.length - 1; 

                    card.innerHTML = `
                        <div class="card-img-wrapper">
                            <img src="${ant.image}" alt="${ant.name}" onerror="this.src='https://images.unsplash.com/photo-1605092676920-8cb5ae46c9d1?q=80&w=600'">
                        </div>
                        <div class="card-content">
                            <h3>${ant.name}</h3>
                            <p>${ant.desc}</p>
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: auto;">
                                <div class="card-footer">Xem chi tiết</div>
                                <button class="btn-edit" data-index="${loadedAnts.length - 1}">✏️ Sửa</button>
                            </div>
                        </div>
                    `;
                    gallery.appendChild(card);
                });
                setupCardClicks();
            } catch (error) {
                gallery.innerHTML = '<p style="color: red;">Lỗi kết nối Firebase.</p>';
            }
        }

        // 2. SỰ KIỆN CLICK MỞ MODAL & SỬA
        function setupCardClicks() {
            // Click vào thẻ để xem chi tiết
            document.querySelectorAll('.card').forEach(card => {
                card.onclick = (e) => {
                    // Nếu click trúng nút sửa thì dừng lại, không mở popup chi tiết
                    if (e.target.classList.contains('btn-edit')) return; 

                    const ant = loadedAnts[card.dataset.index];
                    document.getElementById('detailImg').src = ant.image;
                    document.getElementById('detailName').innerText = ant.name;
                    document.getElementById('detailDesc').innerText = ant.desc;
                    detailModal.style.display = "block";
                };
            });

            // Click vào nút Sửa độc lập
            document.querySelectorAll('.btn-edit').forEach(btn => {
                btn.onclick = (e) => {
                    e.stopPropagation(); // Chống tràn sự kiện click ra thẻ cha (card)
                    
                    const ant = loadedAnts[btn.dataset.index];
                    
                    editId = ant.id; // Gắn ID để bật chế độ Edit
                    formTitle.innerText = "Chỉnh Sửa Cư Dân";
                    
                    // Điền thông tin cũ vào form
                    document.getElementById('antName').value = ant.name;
                    document.getElementById('antImage').value = ant.image;
                    document.getElementById('antDesc').value = ant.desc;
                    document.getElementById('adminPassword').value = ""; // Buộc nhập lại pass quản trị để lưu

                    antModal.style.display = "block";
                };
            });
        }

        // 3. XỬ LÝ ĐÓNG MODAL
        document.getElementById('closeForm').onclick = () => antModal.style.display = "none";
        document.getElementById('closeDetail').onclick = () => detailModal.style.display = "none";

        // Bấm nút "Đăng loài mới" ngoài màn hình chính
        document.getElementById('addBtn').onclick = () => {
            editId = null; // Trở lại trạng thái thêm mới
            formTitle.innerText = "Thêm Cư Dân Mới";
            form.reset(); // Xoá sạch trắng form
            antModal.style.display = "block";
        };

        // 4. GỬI DỮ LIỆU CHUNG (HÀM TỰ ĐỘNG PHÂN CHIA THÊM / SỬA)
        form.onsubmit = async (e) => {
            e.preventDefault();
            if (isSubmitting) return; 

            const pass = document.getElementById('adminPassword').value;
            if (pass !== MAT_KHAU_ADMIN) {
                alert("❌ Sai mật khẩu quản trị!");
                return;
            }

            isSubmitting = true; 
            const submitBtn = form.querySelector('.btn-submit');
            submitBtn.innerText = editId ? "Đang cập nhật..." : "Đang đăng...";

            const antData = {
                name: document.getElementById('antName').value,
                image: document.getElementById('antImage').value,
                desc: document.getElementById('antDesc').value,
                updatedAt: new Date()
            };

            try {
                if (editId) {
                    // Thực hiện UPDATE dữ liệu cũ dựa vào ID
                    const antDocRef = doc(db, "ants", editId);
                    await updateDoc(antDocRef, antData);
                    alert("🎉 Cập nhật thông tin loài kiến thành công!");
                } else {
                    // Thực hiện THÊM MỚI dữ liệu hoàn toàn
                    antData.createdAt = new Date();
                    await addDoc(collection(db, "ants"), antData);
                    alert("🎉 Thêm loài kiến mới thành công!");
                }
                
                form.reset();
                antModal.style.display = "none";
                await loadAntKingdom(); // Reload lại danh sách hiển thị
            } catch (err) {
                console.error(err);
                alert("Đã xảy ra lỗi hệ thống, vui lòng thử lại!");
            } finally {
                isSubmitting = false; 
                submitBtn.innerText = "Xác nhận lưu";
            }
        };

        // Khởi động load danh sách ngay khi mở trang web
        loadAntKingdom();
    </script>
</body>
</html>
